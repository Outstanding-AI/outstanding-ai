name: Deploy AI Engine

# PHASE 2 (PR-2): push trigger enabled after PR-1 smoke + local dry-run
# validated OIDC/IAM/write perms and x86_64 build correctness.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'infra/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.pre-commit-config.yaml'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      smoke_test:
        description: 'Run OIDC/IAM smoke test only (no build, no deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-smoke:
    if: ${{ !inputs.smoke_test }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  pre-commit-verify:
    if: ${{ !inputs.smoke_test }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v8.1.0
        with: { enable-cache: true, cache-dependency-glob: 'uv.lock' }
      - name: Create contracts read token
        id: contracts-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CONTRACTS_CLIENT_ID }}
          private-key: ${{ secrets.CONTRACTS_APP_PRIVATE_KEY }}
          owner: Outstanding-AI
          repositories: outstanding-backend
      - name: Configure git auth for contracts
        env:
          TOKEN: ${{ steps.contracts-token.outputs.token }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Contracts GitHub App token was not created. Check CONTRACTS_CLIENT_ID, CONTRACTS_APP_PRIVATE_KEY, and app access to Outstanding-AI/outstanding-backend."
            exit 1
          fi
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git config --global http.https://github.com/Outstanding-AI/.extraheader \
            "AUTHORIZATION: basic ${AUTH}"
          git ls-remote https://github.com/Outstanding-AI/outstanding-backend.git \
            refs/tags/contracts-v0.12.28 >/dev/null
      - run: uv sync --frozen --extra dev
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
      - name: Clear contracts git auth
        if: always() && steps.contracts-token.outputs.token != ''
        env:
          TOKEN: ${{ steps.contracts-token.outputs.token }}
        run: |
          git config --global --unset-all \
            http.https://github.com/Outstanding-AI/.extraheader || true

  # Smoke test — validates OIDC trust AND the write permissions that most
  # often fail on first real deploy: ecs:RegisterTaskDefinition, iam:PassRole
  # (implicit in register), ecs:UpdateService. Mutates control-plane state
  # (bumps task-def revision, re-points service, leaves one smoke-<RUN_ID>
  # ECR tag), but with desiredCount=0 there is no user-visible impact.
  oidc-smoke:
    if: ${{ inputs.smoke_test }}
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-west-2
      AWS_ACCOUNT_ID: '593212028144'
      ECS_CLUSTER: outstandingai
      ECS_SERVICE: ai-engine
      TASK_FAMILY: outstandingai-ai-engine
      ECR_REPOSITORY: outstandingai/ai-engine
      AI_CLASS_SPECS: "large:2048:4096 xlarge:4096:8192"
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify role assumption + read perms
        run: |
          aws sts get-caller-identity
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].{name:serviceName,td:taskDefinition}'
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition.revision'
          aws ecr get-login-password --region "$AWS_REGION" > /dev/null
          echo "Read perms OK"

      - name: Verify ECR write path (re-tag existing image under smoke tag)
        # Re-tags the live image under smoke-${RUN_ID}. Proves ecr:PutImage +
        # layer-upload perms without a build. No delete step — that would
        # require ecr:BatchDeleteImage; keeping role surface tight. Clean up
        # smoke tags manually or via a lifecycle rule (see infra/README.md).
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          CURRENT_IMAGE=$(aws ecs describe-task-definition --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition.containerDefinitions[0].image' --output text)
          docker pull "$CURRENT_IMAGE"
          SMOKE_TAG="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:smoke-${GITHUB_RUN_ID}"
          docker tag "$CURRENT_IMAGE" "$SMOKE_TAG"
          docker push "$SMOKE_TAG"
          echo "ECR write path OK (smoke tag left in place intentionally)"

      - name: Verify ECS write perms (register identical revision + update-service no-op)
        # Re-registering the current task def produces a byte-identical new
        # revision. register-task-definition internally validates iam:PassRole
        # on executionRoleArn + taskRoleArn.
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" \
            --query taskDefinition > /tmp/td.json
          python3 -c "
          import json
          td = json.load(open('/tmp/td.json'))
          for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          json.dump(td, open('/tmp/td-new.json','w'))
          "
          NEW_REV=$(aws ecs register-task-definition --cli-input-json file:///tmp/td-new.json \
            --query 'taskDefinition.revision' --output text)
          echo "Registered new revision: $NEW_REV (ecs:RegisterTaskDefinition + iam:PassRole OK)"
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" \
            --task-definition "$TASK_FAMILY" --query 'service.taskDefinition' --output text
          echo "ecs:UpdateService OK"
          echo "Base ECS write path OK"

      - name: Verify AI class service create/update perms
        # This intentionally exercises the same control-plane path as the real
        # class deploy. If ai-engine-large/xlarge are missing, the smoke test
        # creates them with desiredCount=0; otherwise it updates them to the
        # freshly registered class task definition. No AI task is started.
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query taskDefinition \
            > /tmp/ai-base-task-definition.json

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0]' \
            > /tmp/ai-base-service.json

          for SPEC in $AI_CLASS_SPECS; do
            IFS=: read -r WORKER_CLASS CPU MEMORY <<< "$SPEC"
            TASK_FAMILY_CLASS="${TASK_FAMILY}-${WORKER_CLASS}"
            SERVICE_CLASS="${ECS_SERVICE}-${WORKER_CLASS}"
            TASK_JSON="/tmp/${TASK_FAMILY_CLASS}.json"
            SERVICE_JSON="/tmp/${SERVICE_CLASS}.json"

            python3 - "$WORKER_CLASS" "$CPU" "$MEMORY" "$TASK_JSON" <<'PY'
          import copy
          import json
          import sys

          worker_class, cpu, memory, output_path = sys.argv[1:]
          base = json.load(open("/tmp/ai-base-task-definition.json"))
          allowed = {
              "family",
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "runtimePlatform",
              "ephemeralStorage",
              "proxyConfiguration",
              "inferenceAccelerators",
              "pidMode",
              "ipcMode",
          }
          payload = {key: copy.deepcopy(base[key]) for key in allowed if key in base}
          payload["family"] = f"{base['family']}-{worker_class}"
          payload["cpu"] = cpu
          payload["memory"] = memory
          for container in payload["containerDefinitions"]:
              env = [item for item in container.get("environment", []) if item.get("name") != "AI_ENGINE_CLASS"]
              env.append({"name": "AI_ENGINE_CLASS", "value": worker_class})
              container["environment"] = sorted(env, key=lambda item: item["name"])
              log_config = container.get("logConfiguration") or {}
              options = log_config.get("options") or {}
              if options.get("awslogs-stream-prefix"):
                  options["awslogs-stream-prefix"] = f"ai-smoke-{worker_class}"
                  log_config["options"] = options
                  container["logConfiguration"] = log_config
          json.dump(payload, open(output_path, "w"))
          PY

            NEW_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json "file://${TASK_JSON}" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            SERVICE_COUNT=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$SERVICE_CLASS" \
              --query 'length(services)' \
              --output text)
            if [ "$SERVICE_COUNT" = "1" ]; then
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$SERVICE_CLASS" \
                --task-definition "$NEW_TASK_DEF" \
                --desired-count 0 \
                --query 'service.{service:serviceName,taskDefinition:taskDefinition,desired:desiredCount}' \
                --output json
            else
              python3 - "$SERVICE_CLASS" "$NEW_TASK_DEF" "$SERVICE_JSON" <<'PY'
          import copy
          import json
          import sys

          service_name, task_definition, output_path = sys.argv[1:]
          base = json.load(open("/tmp/ai-base-service.json"))
          payload = {
              "cluster": base["clusterArn"],
              "serviceName": service_name,
              "taskDefinition": task_definition,
              "desiredCount": 0,
              "enableECSManagedTags": base.get("enableECSManagedTags", True),
          }
          for key in [
              "capacityProviderStrategy",
              "deploymentConfiguration",
              "enableExecuteCommand",
              "healthCheckGracePeriodSeconds",
              "launchType",
              "networkConfiguration",
              "placementConstraints",
              "placementStrategy",
              "platformVersion",
              "propagateTags",
              "schedulingStrategy",
              "serviceRegistries",
          ]:
              value = base.get(key)
              if value not in (None, [], {}):
                  payload[key] = copy.deepcopy(value)
          if payload.get("capacityProviderStrategy"):
              payload.pop("launchType", None)
          json.dump(payload, open(output_path, "w"))
          PY
              aws ecs create-service \
                --cli-input-json "file://${SERVICE_JSON}" \
                --query 'service.{service:serviceName,taskDefinition:taskDefinition,desired:desiredCount}' \
                --output json
            fi
          done

          echo "Smoke test passed — OIDC + ECR write + base ECS write + AI class service create/update verified"

  # Gate on push events only. In PR-1 there is no push trigger, so
  # github.event_name is always 'workflow_dispatch' and this job never runs —
  # regardless of any smoke_test input combination. PR-2 adds push: branches:
  # [main], at which point merges to main fire this job.
  build-and-deploy:
    if: github.event_name == 'push'
    needs: [lint-smoke, pre-commit-verify]
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-west-2
      ECR_REGISTRY: 593212028144.dkr.ecr.eu-west-2.amazonaws.com
      ECR_REPOSITORY: outstandingai/ai-engine
      ECS_CLUSTER: outstandingai
      ECS_SERVICE: ai-engine
      TASK_FAMILY: outstandingai-ai-engine
      CONTAINER_NAME: ai-engine
      AI_CLASS_SPECS: "large:2048:4096 xlarge:4096:8192"
      ECS_CREATE_CLASS_SERVICES: ${{ vars.ECS_CREATE_CLASS_SERVICES || 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - name: Create contracts read token
        id: contracts-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CONTRACTS_CLIENT_ID }}
          private-key: ${{ secrets.CONTRACTS_APP_PRIVATE_KEY }}
          owner: Outstanding-AI
          repositories: outstanding-backend

      - name: Verify contracts tag
        env:
          TOKEN: ${{ steps.contracts-token.outputs.token }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Contracts GitHub App token was not created. Check CONTRACTS_CLIENT_ID, CONTRACTS_APP_PRIVATE_KEY, and app access to Outstanding-AI/outstanding-backend."
            exit 1
          fi
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git -c http.https://github.com/Outstanding-AI/.extraheader="AUTHORIZATION: basic ${AUTH}" \
            ls-remote https://github.com/Outstanding-AI/outstanding-backend.git \
            refs/tags/contracts-v0.12.28 >/dev/null

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          IMAGE_TAG="$(echo "$COMMIT_SHA" | cut -c1-7)"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check whether immutable image tag already exists
        id: image_exists
        run: |
          if aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="${{ steps.meta.outputs.image_tag }}" \
            >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image tag ${{ steps.meta.outputs.image_tag }} already exists; reusing it for this deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image tag ${{ steps.meta.outputs.image_tag }} does not exist; building and pushing it."
          fi

      - name: Build and push (SHA only — no :latest; ECR is IMMUTABLE)
        if: steps.image_exists.outputs.exists != 'true'
        # platforms: linux/amd64 matches task-def cpuArchitecture=X86_64 in
        # infra/ecs-task-ai.json. Without this, an arm64 runner would produce
        # an image that Fargate rejects with 'exec format error'.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            contracts_read_token=${{ steps.contracts-token.outputs.token }}

      - name: Runtime preflight — production settings + app instantiation
        # Satisfies every invariant in src/config/settings.py::_enforce_production_invariants:
        # SERVICE_AUTH_TOKEN set, DEBUG=false, vertex project non-placeholder,
        # VERTEX_WIF_CONFIG_PATH file present (baked into image),
        # running_on_ecs() True (AWS_CONTAINER_CREDENTIALS_RELATIVE_URI set),
        # AWS_REGION set.
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          docker pull "$IMAGE"
          docker run --rm --platform linux/amd64 \
            -e ENVIRONMENT=production \
            -e DEBUG=false \
            -e SERVICE_AUTH_TOKEN=preflight-token \
            -e LLM_PROVIDER=vertex \
            -e VERTEX_PROJECT_ID=preflight-project \
            -e VERTEX_LOCATION=europe-west2 \
            -e VERTEX_WIF_CONFIG_PATH=/app/infra/vertex-wif-config.json \
            -e AWS_REGION=eu-west-2 \
            -e AWS_CONTAINER_CREDENTIALS_RELATIVE_URI=/preflight \
            -e OPENAI_API_KEY=preflight \
            --entrypoint python \
            "$IMAGE" \
            -c "
          from src.main import app
          routes = [r.path for r in app.routes]
          assert '/ping' in routes, f'Expected /ping in routes, got {routes}'
          print(f'AI Engine preflight OK ({len(routes)} routes registered)')
          "

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query taskDefinition \
            > task-definition.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.meta.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Deploy AI Engine class task definitions
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query taskDefinition \
            > /tmp/ai-base-task-definition.json

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0]' \
            > /tmp/ai-base-service.json

          for SPEC in $AI_CLASS_SPECS; do
            IFS=: read -r WORKER_CLASS CPU MEMORY <<< "$SPEC"
            TASK_FAMILY_CLASS="${TASK_FAMILY}-${WORKER_CLASS}"
            SERVICE_CLASS="${ECS_SERVICE}-${WORKER_CLASS}"
            TASK_JSON="/tmp/${TASK_FAMILY_CLASS}.json"
            SERVICE_JSON="/tmp/${SERVICE_CLASS}.json"

            python3 - "$WORKER_CLASS" "$CPU" "$MEMORY" "$TASK_JSON" <<'PY'
          import copy
          import json
          import sys

          worker_class, cpu, memory, output_path = sys.argv[1:]
          base = json.load(open("/tmp/ai-base-task-definition.json"))
          allowed = {
              "family",
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "runtimePlatform",
              "ephemeralStorage",
              "proxyConfiguration",
              "inferenceAccelerators",
              "pidMode",
              "ipcMode",
          }
          payload = {key: copy.deepcopy(base[key]) for key in allowed if key in base}
          payload["family"] = f"{base['family']}-{worker_class}"
          payload["cpu"] = cpu
          payload["memory"] = memory
          for container in payload["containerDefinitions"]:
              env = [item for item in container.get("environment", []) if item.get("name") != "AI_ENGINE_CLASS"]
              env.append({"name": "AI_ENGINE_CLASS", "value": worker_class})
              container["environment"] = sorted(env, key=lambda item: item["name"])
              log_config = container.get("logConfiguration") or {}
              options = log_config.get("options") or {}
              if options.get("awslogs-stream-prefix"):
                  options["awslogs-stream-prefix"] = f"ai-{worker_class}"
                  log_config["options"] = options
                  container["logConfiguration"] = log_config
          json.dump(payload, open(output_path, "w"))
          PY

            NEW_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json "file://${TASK_JSON}" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            SERVICE_COUNT=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$SERVICE_CLASS" \
              --query 'length(services)' \
              --output text)
            if [ "$SERVICE_COUNT" = "1" ]; then
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$SERVICE_CLASS" \
                --task-definition "$NEW_TASK_DEF" \
                --desired-count 0 \
                --query 'service.{service:serviceName,taskDefinition:taskDefinition,desired:desiredCount}' \
                --output json
            elif [ "$ECS_CREATE_CLASS_SERVICES" = "true" ]; then
              python3 - "$SERVICE_CLASS" "$NEW_TASK_DEF" "$SERVICE_JSON" <<'PY'
          import copy
          import json
          import sys

          service_name, task_definition, output_path = sys.argv[1:]
          base = json.load(open("/tmp/ai-base-service.json"))
          payload = {
              "cluster": base["clusterArn"],
              "serviceName": service_name,
              "taskDefinition": task_definition,
              "desiredCount": 0,
              "enableECSManagedTags": base.get("enableECSManagedTags", True),
          }
          for key in [
              "capacityProviderStrategy",
              "deploymentConfiguration",
              "enableExecuteCommand",
              "healthCheckGracePeriodSeconds",
              "launchType",
              "networkConfiguration",
              "placementConstraints",
              "placementStrategy",
              "platformVersion",
              "propagateTags",
              "schedulingStrategy",
              "serviceRegistries",
          ]:
              value = base.get(key)
              if value not in (None, [], {}):
                  payload[key] = copy.deepcopy(value)
          if payload.get("capacityProviderStrategy"):
              payload.pop("launchType", None)
          json.dump(payload, open(output_path, "w"))
          PY
              aws ecs create-service \
                --cli-input-json "file://${SERVICE_JSON}" \
                --query 'service.{service:serviceName,taskDefinition:taskDefinition,desired:desiredCount}' \
                --output json
            else
              echo "AI class service ${SERVICE_CLASS} not provisioned; registered ${NEW_TASK_DEF} only"
            fi
          done
